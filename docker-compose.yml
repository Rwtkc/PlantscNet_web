services:
  plantscnet_api:
    image: node:22-alpine
    container_name: plantscnet_api
    restart: unless-stopped
    user: "997:1001"
    working_dir: /app
    command: ["node", "server/index.js"]
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "1116"
      PLANTSCNET_DATA_DIR: /app/data
      PLANTSCNET_SPECIES_META_DIR: /app/species_meta_data
      PLANTSCNET_FEATHER_DIR: /app/feather_file
      PLANTSCNET_MEME_DIR: /app/meme_file
      PLANTSCNET_TF_LIST_DIR: /app/tf_list
      PLANTSCNET_FINAL_REGULATORY_DIR: /app/final_regulatory_file
    volumes:
      - /public/shiny/PlantScNet/PlantscNet_server:/app:ro
    expose:
      - "1116"

  plantscnet_nginx:
    image: nginx:1.27-alpine
    container_name: plantscnet_nginx
    restart: unless-stopped
    depends_on:
      - plantscnet_api
    ports:
      - "10809:8080"
    volumes:
      - /public/shiny/PlantScNet/dist:/usr/share/nginx/html:ro
      - /public/shiny/PlantScNet/PlantscNet_server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
